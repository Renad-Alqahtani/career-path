<!-- AI Bot Iframe -->
<iframe
  id="career-bot-iframe"
  src="https://bot-to-answer.lovable.app/embed"
  style="position:fixed; bottom:20px; right:20px; width:80px; height:80px; border:none; background:transparent; z-index:999999;">
</iframe>

<script>
  window.addEventListener("message", (event) => {
    if (event.origin !== "https://bot-to-answer.lovable.app") return;

    if (event.data?.type === "career-bot-resize") {
      const iframe = document.getElementById("career-bot-iframe");
      if (!iframe) return;

      if (event.data.open) {
        iframe.style.width = "420px";
        iframe.style.height = "700px";
        iframe.style.maxWidth = "calc(100vw - 40px)";
        iframe.style.maxHeight = "calc(100vh - 40px)";
      } else {
        iframe.style.width = "80px";
        iframe.style.height = "80px";
        iframe.style.maxWidth = "80px";
        iframe.style.maxHeight = "80px";
      }
    }
  });
</script>
