<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CareerPath - AI-Powered Career Guidance for Students</title>

    <meta name="description" content="Get personalized career recommendations based on your skills, academic background, and market trends." />
    <meta name="author" content="CareerPath" />
  </head>

  <body>
    <div id="root"></div>

    <!-- AI Bot Iframe -->
    <iframe
      id="career-bot-iframe"
      src="https://bot-to-answer.lovable.app/embed"
      style="
        position:fixed;
        bottom:20px;
        right:20px;
        width:80px;
        height:80px;
        border:none;
        background:transparent;
        z-index:999999;
      ">
    </iframe>

    <script>
      window.addEventListener("message", (event) => {
        if (event.origin !== "https://bot-to-answer.lovable.app") return;

        const iframe = document.getElementById("career-bot-iframe");
        if (!iframe) return;

        if (event.data?.type === "career-bot-resize") {
          if (event.data.open) {
            iframe.style.width = "420px";
            iframe.style.height = "700px";
          } else {
            iframe.style.width = "80px";
            iframe.style.height = "80px";
          }
        }
      });
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
